<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dean — Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="toast-area" class="toast-area"></div>

  <section id="view-login" class="min-vh-100 d-flex align-items-center py-5 px-3" style="background: linear-gradient(160deg, #064e3b, #0f172a);">
    <div class="card login-card mx-auto w-100">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 mb-1" id="auth-title">Dean sign in</h1>
        <p class="text-muted small mb-4" id="auth-subtitle">View attendance statistics and export reports.</p>

        <div id="panel-login">
          <form id="form-login">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn btn-success w-100 rounded-pill">Sign in</button>
          </form>
          <p class="text-center mt-3 mb-0">
            <button type="button" class="btn btn-link btn-sm" id="btn-show-register">Create dean account</button>
          </p>
        </div>

        <div id="panel-register" class="d-none">
          <form id="form-register">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" autocomplete="username" minlength="3" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" autocomplete="new-password" minlength="6" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm password</label>
              <input type="password" class="form-control" name="password_confirm" autocomplete="new-password" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-outline-success w-100 rounded-pill">Register</button>
          </form>
          <p class="text-center mt-3 mb-0">
            <button type="button" class="btn btn-link btn-sm" id="btn-show-login">Already have an account? Sign in</button>
          </p>
        </div>

        <p class="text-center mt-3 mb-0"><a href="index.html" class="text-decoration-none small">← Back</a></p>
      </div>
    </div>
  </section>

  <section id="view-app" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: #064e3b;">
      <div class="container-fluid">
        <span class="navbar-brand">Dean analytics</span>
        <span class="navbar-text text-white-50 small me-3" id="nav-user"></span>
        <button type="button" class="btn btn-outline-light btn-sm" id="btn-logout">Logout</button>
      </div>
    </nav>

    <div class="container py-4 animate-fade-in-up">
      <div class="row g-3 mb-4 align-items-end">
        <div class="col-auto">
          <label class="form-label mb-0">Report date</label>
          <input type="date" class="form-control" id="summary-date" />
        </div>
        <div class="col-auto">
          <button type="button" class="btn btn-success" id="btn-refresh">Refresh</button>
        </div>
        <div class="col-auto">
          <a class="btn btn-outline-secondary" id="link-export" href="#">Export CSV</a>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card stat-card border-start border-primary border-4">
            <div class="card-body">
              <div class="text-muted small">Present (distinct)</div>
              <div class="display-6 fw-bold text-primary stat-number" id="stat-present">—</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card stat-card border-start border-warning border-4">
            <div class="card-body">
              <div class="text-muted small">Absent (estimate)</div>
              <div class="display-6 fw-bold text-warning stat-number" id="stat-absent">—</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card stat-card border-start border-secondary border-4">
            <div class="card-body">
              <div class="text-muted small">Enrolled students</div>
              <div class="display-6 fw-bold stat-number" id="stat-total">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card stat-card h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Classroom breakdown</h2>
              <div class="table-responsive">
                <table class="table table-hover">
                  <thead><tr><th>Class</th><th>Present</th><th>Enrolled</th><th>%</th></tr></thead>
                  <tbody id="class-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card stat-card h-100">
            <div class="card-body">
              <h2 class="h5 mb-3">Daily presence (last 30 days)</h2>
              <canvas id="chart-line" height="220"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dean.js"></script>
  <script type="module" src="js/firebase-init.js"></script>
</body>
</html>
